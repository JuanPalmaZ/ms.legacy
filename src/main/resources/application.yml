server:
  port: ${PORT:8090} # Puerto asignado exclusivamente para legacy

spring:
  application:
    name: ms-legacy # Nombre con el que se registrará en el panel de Eureka
  
  # ===================================
  # Configuración de Rendimiento
  # ===================================
  threads:
    virtual:
      enabled: true # Aprovecha los hilos virtuales de tu JDK moderno (Java 21)
  
  mvc:
    problemdetails:
      enabled: false # Desactivado para usar tu GlobalExceptionHandler personalizado

  # ===================================
  # Conexión a PostgreSQL (NeonTech)
  # ===================================
  datasource:
    url: jdbc:postgresql://ep-sweet-voice-ac645qo3-pooler.sa-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
    username: neondb_owner
    password: npg_rfs10SMuCKcF
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  # ===================================
  # Configuración de Hibernate / JPA
  # ===================================
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update 
    show-sql: true # Muestra las consultas SQL en consola para pruebas
    properties:
      hibernate:
        format_sql: true # Formatea el SQL para que sea legible

# ===================================
# Swagger / Springdoc
# ===================================
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

# ===================================
# Configuración del Cliente Eureka
# ===================================
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: https://eureka-server-wp64.onrender.com/eureka/

  instance:
    prefer-ip-address: false
    hostname: ${RENDER_EXTERNAL_HOSTNAME:localhost}
    secure-port-enabled: true
    secure-port: 443
    non-secure-port-enabled: false
    home-page-url: https://${RENDER_EXTERNAL_HOSTNAME}/
    status-page-url: https://${RENDER_EXTERNAL_HOSTNAME}/actuator/info
    health-check-url: https://${RENDER_EXTERNAL_HOSTNAME}/actuator/health

# ===================================
# Configuración JWT
# ===================================
jwt:
  # Esta es la misma clave secreta de tu ecosistema para poder validar los tokens del Gateway
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  # Tiempo de vida del token en milisegundos (86400000 ms = 1 día)
  expiration: 86400000
